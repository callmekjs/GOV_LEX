  issued_since_year_offset: -3

kr_decree:
  queries:
    - 시행령
    - 대통령령
    - 총리령
    - 부령
  max_per_query: 80
  issued_since_year_offset: -3
  target: ordin

us_congress:
  congress: 118
  max_count: 250
  min_intro_year_offset: -3

kr_assembly:
  assemblies:
    - 제21대
    - 제22대
  test_limit: 5000
  page_size: 100
  start_year_offset: -3
  end_year_offset: -1
